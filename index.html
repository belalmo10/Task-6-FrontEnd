<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkVault — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .auth-form { display: none; }
    .auth-form.active { display: block; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-glow auth-glow-1"></div>
  <div class="auth-glow auth-glow-2"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <h1>Link<span style="color:var(--accent)">Vault</span></h1>
      <p>Your personal bookmark & notes hub</p>
    </div>

    <div id="alert-box"></div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form active" onsubmit="doLogin(event)">
      <div class="mb-3">
        <label class="form-label" for="login-email">Email</label>
        <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required/>
      </div>
      <div class="mb-4">
        <label class="form-label" for="login-password">Password</label>
        <input type="password" class="form-control" id="login-password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="login-btn">Sign In</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="auth-form" onsubmit="doRegister(event)">
      <div class="row g-2 mb-3">
        <div class="col">
          <label class="form-label" for="reg-fname">First Name</label>
          <input type="text" class="form-control" id="reg-fname" placeholder="Ahmed" required/>
        </div>
        <div class="col">
          <label class="form-label" for="reg-lname">Last Name</label>
          <input type="text" class="form-control" id="reg-lname" placeholder="Ali" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label" for="reg-email">Email</label>
        <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" required/>
      </div>
      <div class="mb-4">
        <label class="form-label" for="reg-password">Password</label>
        <input type="password" class="form-control" id="reg-password" placeholder="Min 8 chars, upper + special" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="register-btn">Create Account</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
  redirectIfLoggedIn();

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById(tab + '-form').classList.add('active');
    document.getElementById('alert-box').innerHTML = '';
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    try {
      const data = await api('/Auth/Login', 'POST', {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });
      localStorage.setItem('token', data.token);
      window.location.href = 'categories.html';
    } catch (err) {
      showAlert('alert-box', err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function doRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';
    try {
      const data = await api('/Auth/Register', 'POST', {
        firstName: document.getElementById('reg-fname').value,
        lastName: document.getElementById('reg-lname').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
      });
      localStorage.setItem('token', data.token);
      window.location.href = 'categories.html';
    } catch (err) {
      showAlert('alert-box', err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
